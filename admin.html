
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Money Machine — Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --pink:#ff00ff;--cyan:#00ffff;--green:#39ff14;--orange:#ff6600;
  --yellow:#ffff00;--purple:#bf00ff;--dark:#030006;
  --surface:#0a0015;--surface2:#0f001f;--border:rgba(255,255,255,0.08);
}
body{background:var(--dark);color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background-image:linear-gradient(rgba(255,0,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,0,255,.03) 1px,transparent 1px);
  background-size:40px 40px;z-index:0;pointer-events:none;}

/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:2000;background:var(--dark);}
.login-wrap{background:rgba(10,0,22,.98);border:2px solid var(--pink);border-radius:22px;padding:52px 44px;max-width:420px;width:92%;text-align:center;box-shadow:0 0 60px rgba(255,0,255,.3),0 0 120px rgba(255,0,255,.12);}
.login-pulse{font-size:4.5rem;display:block;margin-bottom:18px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.login-title{font-size:1.9rem;font-weight:900;background:linear-gradient(90deg,var(--pink),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.login-sub{color:rgba(255,255,255,.4);font-size:.82rem;margin-bottom:28px;}
.l-inp{width:100%;padding:13px 16px;background:rgba(0,0,0,.6);border:1px solid rgba(255,0,255,.3);border-radius:10px;color:#fff;font-size:.9rem;outline:none;transition:all .3s;margin-bottom:12px;}
.l-inp:focus{border-color:var(--pink);box-shadow:0 0 12px rgba(255,0,255,.25);}
.l-inp::placeholder{color:rgba(255,255,255,.28);}
.l-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:900;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .3s;}
.l-btn:hover{box-shadow:0 0 28px rgba(255,0,255,.5);transform:translateY(-2px);}
.l-err{color:#ff4444;font-size:.8rem;margin-top:8px;min-height:18px;}
.l-hint{margin-top:16px;font-size:.7rem;color:rgba(255,255,255,.2);}

/* ── LAYOUT ── */
#adminApp{display:none;min-height:100vh;}
.sidebar{position:fixed;top:0;left:0;height:100vh;width:230px;background:rgba(6,0,14,.97);border-right:1px solid rgba(255,0,255,.15);z-index:100;display:flex;flex-direction:column;transition:transform .3s;}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,0,255,.12);}
.sb-logo-text{font-size:.95rem;font-weight:900;background:linear-gradient(90deg,var(--pink),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;}
.sb-logo-sub{font-size:.65rem;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:1px;}
.sb-nav{flex:1;padding:12px 0;overflow-y:auto;}
.sb-nav::-webkit-scrollbar{width:3px;}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,0,255,.3);border-radius:2px;}
.sb-item{display:flex;align-items:center;gap:11px;padding:11px 18px;cursor:pointer;font-size:.84rem;color:rgba(255,255,255,.48);transition:all .22s;border-left:3px solid transparent;text-decoration:none;}
.sb-item:hover{color:rgba(255,255,255,.85);background:rgba(255,0,255,.07);}
.sb-item.active{color:var(--pink);border-left-color:var(--pink);background:rgba(255,0,255,.1);font-weight:700;}
.sb-icon{font-size:1rem;width:20px;text-align:center;flex-shrink:0;}
.sb-divider{height:1px;background:rgba(255,255,255,.06);margin:8px 14px;}
.sb-section{font-size:.62rem;color:rgba(255,255,255,.25);padding:8px 18px 4px;letter-spacing:2px;text-transform:uppercase;}
.sb-bottom{padding:14px 18px;border-top:1px solid rgba(255,255,255,.06);}
.sb-user{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:900;flex-shrink:0;}
.sb-uname{font-size:.8rem;font-weight:700;color:#fff;}
.sb-urole{font-size:.68rem;color:rgba(255,255,255,.35);}
.logout-btn{width:100%;padding:8px;background:rgba(255,50,50,.1);border:1px solid rgba(255,50,50,.3);color:#ff5555;border-radius:8px;cursor:pointer;font-size:.78rem;font-weight:700;transition:all .3s;}
.logout-btn:hover{background:rgba(255,50,50,.22);}

/* ── MAIN ── */
.main{margin-left:230px;min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:rgba(6,0,14,.95);border-bottom:1px solid var(--border);padding:14px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);}
.page-title{font-size:1.25rem;font-weight:900;color:#fff;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.tb-badge{padding:5px 12px;border-radius:12px;font-size:.72rem;font-weight:800;letter-spacing:1px;}
.tb-live{background:rgba(57,255,20,.15);border:1px solid rgba(57,255,20,.4);color:var(--green);animation:pulse-badge 2s ease-in-out infinite;}
@keyframes pulse-badge{0%,100%{opacity:1;}50%{opacity:.6;}}
.tb-time{font-size:.78rem;color:rgba(255,255,255,.4);font-family:monospace;}
.store-link{padding:6px 14px;background:rgba(0,255,255,.1);border:1px solid rgba(0,255,255,.3);color:var(--cyan);border-radius:8px;font-size:.75rem;font-weight:700;text-decoration:none;transition:all .3s;}
.store-link:hover{background:rgba(0,255,255,.2);}
.content{flex:1;padding:26px;}

/* ── PAGES ── */
.page{display:none;}
.page.active{display:block;}

/* ── CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px;margin-bottom:24px;}
.kpi{background:var(--surface);border:1px solid;border-radius:14px;padding:20px;position:relative;overflow:hidden;transition:transform .3s;}
.kpi:hover{transform:translateY(-3px);}
.kpi:nth-child(1){border-color:rgba(0,255,255,.35);box-shadow:0 0 18px rgba(0,255,255,.1);}
.kpi:nth-child(2){border-color:rgba(57,255,20,.35);box-shadow:0 0 18px rgba(57,255,20,.1);}
.kpi:nth-child(3){border-color:rgba(255,0,255,.35);box-shadow:0 0 18px rgba(255,0,255,.1);}
.kpi:nth-child(4){border-color:rgba(255,165,0,.35);box-shadow:0 0 18px rgba(255,165,0,.1);}
.kpi:nth-child(5){border-color:rgba(191,0,255,.35);box-shadow:0 0 18px rgba(191,0,255,.1);}
.kpi:nth-child(6){border-color:rgba(255,255,0,.35);box-shadow:0 0 18px rgba(255,255,0,.1);}
.kpi-icon{font-size:1.8rem;margin-bottom:8px;}
.kpi-label{font-size:.7rem;color:rgba(255,255,255,.42);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;}
.kpi-value{font-size:2rem;font-weight:900;line-height:1;}
.kpi:nth-child(1) .kpi-value{color:var(--cyan);text-shadow:0 0 12px var(--cyan);}
.kpi:nth-child(2) .kpi-value{color:var(--green);text-shadow:0 0 12px var(--green);}
.kpi:nth-child(3) .kpi-value{color:var(--pink);text-shadow:0 0 12px var(--pink);}
.kpi:nth-child(4) .kpi-value{color:#ffa500;text-shadow:0 0 12px #ffa500;}
.kpi:nth-child(5) .kpi-value{color:var(--purple);text-shadow:0 0 12px var(--purple);}
.kpi:nth-child(6) .kpi-value{color:var(--yellow);text-shadow:0 0 12px var(--yellow);}
.kpi-sub{font-size:.72rem;color:rgba(255,255,255,.38);margin-top:6px;}
.kpi-trend{position:absolute;top:16px;right:16px;font-size:.72rem;font-weight:800;padding:3px 8px;border-radius:8px;}
.trend-up{background:rgba(57,255,20,.15);color:var(--green);}
.trend-dn{background:rgba(255,50,50,.15);color:#ff5555;}

/* ── SECTION CARD ── */
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:20px;}
.sec-card-title{font-size:.88rem;font-weight:800;color:var(--cyan);text-shadow:0 0 8px rgba(0,255,255,.4);margin-bottom:18px;padding-bottom:11px;border-bottom:1px solid rgba(0,255,255,.12);text-transform:uppercase;letter-spacing:2px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.sec-card-title span{font-size:.75rem;font-weight:700;color:rgba(255,255,255,.4);text-transform:none;letter-spacing:0;}

/* ── CHART GRID ── */
.chart-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px;}
.chart-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:20px;}
@media(max-width:1100px){.chart-grid{grid-template-columns:1fr;}.chart-grid-3{grid-template-columns:1fr 1fr;}}
@media(max-width:700px){.chart-grid-3{grid-template-columns:1fr;}.main{margin-left:0;}}
.chart-wrap{position:relative;height:220px;}
.chart-wrap-sm{position:relative;height:180px;}

/* ── TABLES ── */
.tbl-wrap{overflow-x:auto;}
.tbl{width:100%;border-collapse:collapse;font-size:.8rem;}
.tbl th{padding:10px 12px;background:rgba(255,0,255,.08);color:var(--pink);font-weight:800;text-transform:uppercase;letter-spacing:.8px;font-size:.7rem;text-align:left;border-bottom:1px solid rgba(255,0,255,.2);white-space:nowrap;}
.tbl td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle;}
.tbl tr:hover td{background:rgba(255,255,255,.025);}
.tbl tr:last-child td{border-bottom:none;}
.tbl-sort{cursor:pointer;user-select:none;}
.tbl-sort:hover{color:var(--cyan);}
.badge{display:inline-block;padding:3px 9px;border-radius:9px;font-size:.67rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;}
.b-green{background:rgba(57,255,20,.15);color:var(--green);border:1px solid rgba(57,255,20,.3);}
.b-orange{background:rgba(255,165,0,.15);color:#ffa500;border:1px solid rgba(255,165,0,.3);}
.b-cyan{background:rgba(0,255,255,.15);color:var(--cyan);border:1px solid rgba(0,255,255,.3);}
.b-pink{background:rgba(255,0,255,.15);color:var(--pink);border:1px solid rgba(255,0,255,.3);}
.b-purple{background:rgba(191,0,255,.15);color:var(--purple);border:1px solid rgba(191,0,255,.3);}
.b-yellow{background:rgba(255,255,0,.15);color:var(--yellow);border:1px solid rgba(255,255,0,.3);}
.b-red{background:rgba(255,50,50,.15);color:#ff5555;border:1px solid rgba(255,50,50,.3);}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.f-inp{padding:8px 13px;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:.8rem;outline:none;transition:border-color .3s;}
.f-inp:focus{border-color:var(--cyan);}
.f-inp::placeholder{color:rgba(255,255,255,.28);}
.f-btn{padding:8px 14px;border:1px solid;border-radius:8px;cursor:pointer;font-size:.78rem;font-weight:700;transition:all .3s;}
.f-btn-c{background:rgba(0,255,255,.1);border-color:rgba(0,255,255,.3);color:var(--cyan);}
.f-btn-c:hover,.f-btn-c.active{background:rgba(0,255,255,.22);}
.f-btn-p{background:rgba(255,0,255,.1);border-color:rgba(255,0,255,.3);color:var(--pink);}
.f-btn-p:hover,.f-btn-p.active{background:rgba(255,0,255,.22);}
.f-btn-g{background:rgba(57,255,20,.1);border-color:rgba(57,255,20,.3);color:var(--green);}
.f-btn-g:hover,.f-btn-g.active{background:rgba(57,255,20,.22);}
.f-btn-o{background:rgba(255,165,0,.1);border-color:rgba(255,165,0,.3);color:#ffa500;}
.f-btn-o:hover,.f-btn-o.active{background:rgba(255,165,0,.22);}
.f-btn-r{background:rgba(255,50,50,.1);border-color:rgba(255,50,50,.3);color:#ff5555;}
.f-btn-r:hover{background:rgba(255,50,50,.22);}
.f-search{flex:1;min-width:180px;}

/* ── ACTION BUTTONS ── */
.act-btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:.78rem;font-weight:700;transition:all .3s;letter-spacing:.5px;}
.ab-fulfill{background:rgba(57,255,20,.15);border:1px solid rgba(57,255,20,.35);color:var(--green);}
.ab-fulfill:hover{background:rgba(57,255,20,.28);}
.ab-del{background:rgba(255,50,50,.12);border:1px solid rgba(255,50,50,.3);color:#ff5555;}
.ab-del:hover{background:rgba(255,50,50,.25);}
.ab-copy{background:rgba(0,255,255,.1);border:1px solid rgba(0,255,255,.25);color:var(--cyan);}
.ab-copy:hover{background:rgba(0,255,255,.2);}
.ab-email{background:rgba(191,0,255,.1);border:1px solid rgba(191,0,255,.3);color:var(--purple);}
.ab-email:hover{background:rgba(191,0,255,.2);}
.ab-primary{background:linear-gradient(135deg,var(--cyan),#0055ff);color:#000;font-weight:900;}
.ab-primary:hover{box-shadow:0 0 14px rgba(0,255,255,.4);transform:translateY(-1px);}
.ab-success{background:linear-gradient(135deg,var(--green),#00aa00);color:#000;font-weight:900;}
.ab-success:hover{box-shadow:0 0 14px rgba(57,255,20,.4);}
.ab-export{background:linear-gradient(135deg,var(--orange),#cc4400);color:#fff;font-weight:900;padding:8px 18px;}
.ab-export:hover{box-shadow:0 0 14px rgba(255,102,0,.4);}
.ab-warn{background:rgba(255,165,0,.15);border:1px solid rgba(255,165,0,.35);color:#ffa500;}
.ab-warn:hover{background:rgba(255,165,0,.28);}

/* ── GRID 2 ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
@media(max-width:800px){.grid2{grid-template-columns:1fr;}}

/* ── FORM ELEMENTS ── */
.f-label{display:block;font-size:.7rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.f-field{width:100%;padding:10px 13px;background:rgba(0,0,0,.45);border:1px solid var(--border);border-radius:9px;color:#fff;font-size:.87rem;outline:none;transition:border-color .3s;margin-bottom:14px;}
.f-field:focus{border-color:var(--cyan);box-shadow:0 0 8px rgba(0,255,255,.15);}
.f-field::placeholder{color:rgba(255,255,255,.25);}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.f-row{grid-template-columns:1fr;}}

/* ── PRODUCT CARDS ── */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .3s;}
.product-card:hover{border-color:rgba(255,0,255,.3);box-shadow:0 0 20px rgba(255,0,255,.1);}
.pc-cover{height:100px;display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;}
.pc-active-dot{position:absolute;top:10px;right:10px;width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);}
.pc-inactive-dot{background:#ff5555;box-shadow:0 0 8px #ff5555;}
.pc-body{padding:16px;}
.pc-title{font-size:.85rem;font-weight:800;color:#fff;margin-bottom:8px;line-height:1.35;}
.pc-price-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.pc-price{font-size:1.2rem;font-weight:900;color:#fff;}
.pc-member{font-size:.8rem;color:var(--green);font-weight:700;}
.pc-stats{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.pc-stat{font-size:.72rem;color:rgba(255,255,255,.45);background:rgba(0,0,0,.3);padding:3px 8px;border-radius:6px;}
.pc-stat span{color:#fff;font-weight:700;}
.pc-actions{display:flex;gap:8px;flex-wrap:wrap;}
.pc-toggle{padding:6px 12px;border-radius:7px;border:none;cursor:pointer;font-size:.72rem;font-weight:800;transition:all .3s;}
.pc-on{background:rgba(57,255,20,.15);border:1px solid rgba(57,255,20,.3);color:var(--green);}
.pc-off{background:rgba(255,50,50,.15);border:1px solid rgba(255,50,50,.3);color:#ff5555;}

/* ── COUPON CARDS ── */
.coupon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:20px;}
.coupon-card{background:linear-gradient(135deg,rgba(255,255,0,.08),rgba(255,102,0,.08));border:2px dashed rgba(255,255,0,.3);border-radius:12px;padding:16px;text-align:center;position:relative;}
.cc-code{font-size:1.4rem;font-weight:900;color:var(--yellow);text-shadow:0 0 12px var(--yellow);letter-spacing:3px;font-family:monospace;margin-bottom:4px;}
.cc-desc{font-size:.75rem;color:rgba(255,255,255,.5);margin-bottom:8px;}
.cc-stats{display:flex;justify-content:center;gap:12px;font-size:.72rem;color:rgba(255,255,255,.55);}
.cc-stat-val{color:#fff;font-weight:800;}
.cc-del{position:absolute;top:8px;right:8px;background:none;border:none;color:rgba(255,50,50,.5);cursor:pointer;font-size:.85rem;transition:color .3s;padding:2px;}
.cc-del:hover{color:#ff5555;}

/* ── REPORT CARDS ── */
.report-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;}
.report-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;text-align:center;transition:all .3s;}
.report-card:hover{border-color:rgba(255,102,0,.35);box-shadow:0 0 18px rgba(255,102,0,.1);transform:translateY(-3px);}
.rc-icon{font-size:2.8rem;margin-bottom:12px;display:block;}
.rc-title{font-size:.95rem;font-weight:800;color:#fff;margin-bottom:6px;}
.rc-desc{font-size:.78rem;color:rgba(255,255,255,.45);line-height:1.6;margin-bottom:14px;}

/* ── MINI PROGRESS ── */
.mini-bar-wrap{margin-bottom:12px;}
.mini-bar-label{display:flex;justify-content:space-between;font-size:.75rem;color:rgba(255,255,255,.55);margin-bottom:4px;}
.mini-bar-label span{color:#fff;font-weight:700;}
.mini-bar{height:6px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:6px;transition:width .8s ease;}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;padding:12px 20px;border-radius:10px;font-size:.84rem;font-weight:700;z-index:9999;opacity:0;transform:translateY(8px);transition:all .35s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast-g{background:rgba(57,255,20,.2);border:1px solid var(--green);color:var(--green);}
.toast-c{background:rgba(0,255,255,.2);border:1px solid var(--cyan);color:var(--cyan);}
.toast-r{background:rgba(255,50,50,.2);border:1px solid #ff5555;color:#ff5555;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--surface2);border:2px solid var(--cyan);border-radius:18px;padding:32px;max-width:520px;width:92%;box-shadow:0 0 40px rgba(0,255,255,.2);}
.modal-title{font-size:1.1rem;font-weight:900;color:var(--cyan);margin-bottom:18px;}
.modal-close{float:right;background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:1.2rem;line-height:1;}
.modal-close:hover{color:#fff;}

/* ── MISC ── */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--pink),transparent);margin:4px 0 20px;}
.empty-state{text-align:center;padding:48px;color:rgba(255,255,255,.3);}
.empty-icon{font-size:3rem;margin-bottom:10px;}
.text-green{color:var(--green);} .text-pink{color:var(--pink);} .text-cyan{color:var(--cyan);}
.text-yellow{color:var(--yellow);} .text-orange{color:var(--orange);}
.fw9{font-weight:900;} .fz-sm{font-size:.78rem;} .fz-xs{font-size:.72rem;}
.mb0{margin-bottom:0;} .mt8{margin-top:8px;} .op4{opacity:.4;}
.flex-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ml-auto{margin-left:auto;}
select.f-inp option{background:#0a0015;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-wrap">
